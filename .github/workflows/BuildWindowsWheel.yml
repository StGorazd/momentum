name: Build PyMomentum Wheel Windows

on:
  workflow_dispatch:

jobs:
  pymomentum:
    name: py311-cuda118-win
    runs-on: windows-latest
    env:
      FULL_CUDA_VERSION: "11.8.0"
      CMAKE_C_COMPILER_LAUNCHER: sccache
      CMAKE_CXX_COMPILER_LAUNCHER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup CUDA
        uses: ./.github/actions/setup-cuda
        with:
          cuda-version: "11.8.0"

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: "latest"
          python-version: "3.11"
          activate-environment: pymomentum-build
          auto-activate-base: false

      - name: Install build dependencies via conda
        shell: bash -el {0}
        run: |
          conda install -y -c conda-forge \
            eigen \
            ceres-solver \
            metis \
            cli11 \
            dispenso \
            fmt \
            nlohmann_json \
            ms-gsl \
            spdlog \
            re2 \
            zlib \
            openssl \
            urdfdom \
            ezc3d \
            fx-gltf \
            indicators \
            openfbx \
            drjit-cpp \
            librerun-sdk \
            arrow-cpp \
            kokkos \
            cmake \
            ninja

      - name: Install PyTorch 2.7.1 + CUDA 11.8
        shell: bash -el {0}
        run: |
          pip install torch==2.7.1+cu118 torchvision torchaudio \
            --index-url https://download.pytorch.org/whl/cu118

      - name: Install Python build tools
        shell: bash -el {0}
        run: |
          pip install build scikit-build-core pybind11

      - name: Build PyMomentum Wheel
        shell: bash -el {0}
        run: |
          export CMAKE_PREFIX_PATH="$CONDA_PREFIX"
          export PATH="$CONDA_PREFIX/Library/bin:$CONDA_PREFIX/bin:$PATH"
          export SKBUILD_CMAKE_ARGS="-DMOMENTUM_BUILD_PYMOMENTUM=ON;-DBUILD_SHARED_LIBS=OFF;-DMOMENTUM_BUILD_TESTING=OFF;-DRERUN_DOWNLOAD_AND_BUILD_ARROW=OFF;-DMOMENTUM_USE_SYSTEM_RERUN_CPP_SDK=ON"
          python -m build --wheel --no-isolation --outdir dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pymomentum-wheel-py311-cuda118-win
          path: dist/*.whl
          if-no-files-found: error

      - name: Print sccache stats
        run: sccache --show-stats
