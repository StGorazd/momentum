name: Build PyMomentum Wheel Windows CUDA 11.8

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wheel:
    name: py311-torch271-cuda118-win
    runs-on: windows-latest

    env:
      FULL_CUDA_VERSION: "11.8.0"
      CMAKE_C_COMPILER_LAUNCHER: sccache
      CMAKE_CXX_COMPILER_LAUNCHER: sccache
      SCCACHE_GHA_ENABLED: "true"
      CUDA_HOME: "C:\\Program Files\\NVIDIA GPU Computing Toolkit\\CUDA\\v11.8"
      CUDA_PATH: "C:\\Program Files\\NVIDIA GPU Computing Toolkit\\CUDA\\v11.8"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Setup CUDA 11.8
        uses: ./.github/actions/setup-cuda
        with:
          cuda-version: "11.8.0"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel build

      - name: Install PyTorch 2.7.1 CUDA 11.8
        run: |
          pip install torch==2.7.1 --index-url https://download.pytorch.org/whl/cu118

      - name: Install project build dependencies
        run: |
          pip install -r requirements.txt
        shell: pwsh
        continue-on-error: true

      - name: Build wheel
        run: |
          python -m build --wheel --no-isolation

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pymomentum-wheel-py311-torch271-cu118-win
          path: dist/*.whl

      - name: Print sccache stats
        run: sccache --show-stats
