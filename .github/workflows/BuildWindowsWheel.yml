name: Build PyMomentum Wheel Windows

on:
  workflow_dispatch:

jobs:
  pymomentum:
    name: py311-cuda118-win
    runs-on: windows-latest
    env:
      FULL_CUDA_VERSION: "11.8.0"
      CMAKE_C_COMPILER_LAUNCHER: sccache
      CMAKE_CXX_COMPILER_LAUNCHER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup CUDA
        uses: ./.github/actions/setup-cuda
        with:
          cuda-version: "11.8.0"

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: "latest"
          python-version: "3.11"
          activate-environment: pymomentum-build
          auto-activate-base: false

      - name: Install PyTorch 2.7.1 + CUDA 11.8
        shell: bash -el {0}
        run: |
          pip install torch==2.7.1+cu118 torchvision torchaudio \
            --index-url https://download.pytorch.org/whl/cu118

      - name: Install build dependencies via conda
        shell: bash -el {0}
        run: |
          conda install -y -c conda-forge \
            eigen \
            ceres-solver \
            dispenso \
            cmake \
            ninja

      - name: Set up pixi (for C++ deps only)
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Build PyMomentum Wheel
        shell: bash -el {0}
        run: |
          python -m build --wheel --outdir dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pymomentum-wheel-py311-cuda118-win
          path: dist/*.whl
          if-no-files-found: error

      - name: Print sccache stats
        run: sccache --show-stats
