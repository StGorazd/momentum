name: Build PyMomentum Wheel Windows CUDA 11.8

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    paths-ignore:
      - "**/website/**"
  pull_request:
    branches:
      - "**"
    paths-ignore:
      - "**/website/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wheel:
    name: py311-torch271-cuda118-win
    runs-on: windows-latest

    env:
      FULL_CUDA_VERSION: "11.8.0"
      CMAKE_C_COMPILER_LAUNCHER: sccache
      CMAKE_CXX_COMPILER_LAUNCHER: sccache
      SCCACHE_GHA_ENABLED: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup CUDA
        uses: ./.github/actions/setup-cuda
        with:
          cuda-version: "11.8.0"

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Build wheel
        run: |
          pixi run -e py311-cuda118 build_wheel

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pymomentum-wheel-py311-torch271-cuda118-win
          path: |
            dist/*.whl
            wheelhouse/*.whl

      - name: Print sccache stats
        run: sccache --show-stats
