name: Build pymomentum wheel (Windows, Py311, Torch 2.7.1, cu118)

on:
  workflow_dispatch:

jobs:
  build-wheel:
    runs-on: windows-latest

    env:
      CMAKE_GENERATOR: Ninja
      CUDA_HOME: "C:\\Program Files\\NVIDIA GPU Computing Toolkit\\CUDA\\v11.8"
      CUDA_PATH: "C:\\Program Files\\NVIDIA GPU Computing Toolkit\\CUDA\\v11.8"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CUDA Toolkit 11.8
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: "11.8.0"

      - name: Verify CUDA
        shell: pwsh
        run: |
          $env:PATH = "$env:CUDA_PATH\bin;$env:PATH"
          nvcc --version

      - name: Install Python build tools
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install scikit-build-core build cmake ninja packaging

      - name: Install PyTorch 2.7.1 cu118
        shell: pwsh
        run: |
          python -m pip install torch==2.7.1 torchvision==0.22.1 torchaudio==2.7.1 --index-url https://download.pytorch.org/whl/cu118

      - name: Verify Python / Torch / CUDA
        shell: pwsh
        run: |
          python -c "import sys; print(sys.version)"
          python -c "import torch; print('torch=', torch.__version__); print('torch.cuda=', torch.version.cuda); print('cuda_available=', torch.cuda.is_available())"

      - name: Build wheel
        shell: pwsh
        run: |
          python -m build --wheel

      - name: List built files
        shell: pwsh
        run: |
          Get-ChildItem dist -Force

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pymomentum-wheel-win-py311-cu118
          path: dist/*.whl
